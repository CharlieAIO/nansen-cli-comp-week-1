name: Deploy to Railway

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Railway backend deploy
        run: curl -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK_BACKEND }}"

  deploy-frontend:
    name: Deploy Frontend
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Railway frontend deploy
        run: curl -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK_FRONTEND }}"
